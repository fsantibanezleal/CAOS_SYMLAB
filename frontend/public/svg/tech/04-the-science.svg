<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" class="arch-svg" role="img" aria-label="The science flow: how one candidate expression is proposed, guarded, scored and kept">
  <style>
    .arch-svg text { font-family: var(--font-sans, Inter, "Segoe UI", system-ui, sans-serif); }
    .arch-svg .mono { font-family: var(--font-mono, ui-monospace, Consolas, monospace); font-size: 10px; }
    .arch-svg .bx { fill: var(--color-surface-2); stroke: var(--color-border); stroke-width: 1.2; }
    .arch-svg .bx-hi { stroke: var(--color-accent); stroke-width: 1.8; }
    .arch-svg .bx-warn { stroke: var(--color-warn, #c2415f); stroke-width: 1.6; stroke-dasharray: 5 3; }
    .arch-svg .ttl { fill: var(--color-fg); font-size: 13px; font-weight: 700; }
    .arch-svg .sub { fill: var(--color-fg-subtle); font-size: 10px; }
    .arch-svg .hd { fill: var(--color-fg); font-size: 15px; font-weight: 700; }
    .arch-svg .lane { fill: var(--color-fg-subtle); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; }
    .arch-svg .ln { stroke: var(--color-border); stroke-width: 1.4; fill: none; }
    .arch-svg .dot { fill: var(--color-accent); }
  </style>

  <text class="hd" x="24" y="28">The science: how one candidate expression is proposed, guarded, fitted and kept</text>
  <text class="sub" x="24" y="48">Read left to right. The guard at step two is what separates this from a tutorial implementation.</text>

  <rect class="bx" x="24" y="72" width="164" height="100" rx="8"/>
  <text class="ttl" x="38" y="94">1. Propose</text>
  <text class="sub" x="38" y="114">ramped half-and-half,</text>
  <text class="sub" x="38" y="128">crossover, subtree, point</text>
  <text class="sub" x="38" y="142">and hoist mutation</text>
  <text class="sub" x="38" y="162">hoist is the only one that shrinks</text>

  <path class="ln" d="M188 122 H218"/><polygon class="dot" points="218,118 228,122 218,126"/>

  <rect class="bx bx-hi" x="232" y="72" width="188" height="100" rx="8"/>
  <text class="ttl" x="246" y="94">2. Guard, before evaluating</text>
  <text class="sub" x="246" y="114">interval arithmetic rejects a</text>
  <text class="sub" x="246" y="128">division by an interval containing</text>
  <text class="sub" x="246" y="142">zero. NO protected operators:</text>
  <text class="sub" x="246" y="156">protection silently changes the</text>
  <text class="sub" x="246" y="168">function being searched</text>

  <path class="ln" d="M420 122 H450"/><polygon class="dot" points="450,118 460,122 450,126"/>

  <rect class="bx bx-hi" x="464" y="72" width="188" height="100" rx="8"/>
  <text class="ttl" x="478" y="94">3. Fit what is solvable</text>
  <text class="sub" x="478" y="114">linear scaling in closed form,</text>
  <text class="sub" x="478" y="128">then Levenberg-Marquardt on the</text>
  <text class="sub" x="478" y="142">numeric leaves, written back so</text>
  <text class="sub" x="478" y="156">the gain is inherited rather than</text>
  <text class="sub" x="478" y="168">rediscovered every generation</text>

  <path class="ln" d="M652 122 H682"/><polygon class="dot" points="682,118 692,122 682,126"/>

  <rect class="bx" x="696" y="72" width="180" height="100" rx="8"/>
  <text class="ttl" x="710" y="94">4. Survive</text>
  <text class="sub" x="710" y="114">Pareto survival on</text>
  <text class="sub" x="710" y="128">(loss, complexity), age as a</text>
  <text class="sub" x="710" y="142">third objective, islands with</text>
  <text class="sub" x="710" y="156">migration, deduplication</text>

  <text class="lane" x="24" y="212">THE OUTPUT IS A FRONT, AND ONE POINT IS THEN CHOSEN</text>

  <rect class="bx" x="24" y="226" width="410" height="106" rx="8"/>
  <text class="ttl" x="38" y="248">Selection by description length</text>
  <text class="sub" x="38" y="268">total = structure + constants + residuals, measured in nats</text>
  <text class="sub" x="38" y="288">Choosing the most ACCURATE member instead reproduces the</text>
  <text class="sub" x="38" y="302">field headline failure, because the most accurate member of a</text>
  <text class="sub" x="38" y="316">front is routinely the most over-parameterised one.</text>

  <rect class="bx bx-hi" x="452" y="226" width="424" height="106" rx="8"/>
  <text class="ttl" x="468" y="248">Then three independent equivalence tests</text>
  <text class="sub" x="468" y="270">symbolic simplification, exact when it terminates</text>
  <text class="sub" x="468" y="286">numerical probing, blind to what happens outside the box</text>
  <text class="sub" x="468" y="302">structural edit distance, the only one giving graded credit</text>
  <text class="sub" x="468" y="320">Their DISAGREEMENTS are reported, not resolved.</text>

  <rect class="bx bx-warn" x="24" y="352" width="852" height="96" rx="8"/>
  <text class="ttl" x="40" y="374">The measurement this lab exists to publish</text>
  <text class="sub" x="40" y="396">Accuracy solution rate and exact recovery rate are reported SEPARATELY and never merged. The gap between them is the finding.</text>
  <text class="sub" x="40" y="414">The symbolic-test FAILURE rate is published too: when the simplifier times out or throws, that is a defect of the scorer, and</text>
  <text class="sub" x="40" y="430">charging it to the search, as common practice does, penalises whichever method produces expressions the simplifier finds hard.</text>
</svg>
