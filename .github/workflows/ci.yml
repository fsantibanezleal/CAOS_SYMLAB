name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (offline lane + dev + editable pkg)
        run: pip install -r data-pipeline/requirements.txt -r requirements-dev.txt -e .
      - name: Lint
        run: ruff check data-pipeline tests
      - name: Tests
        run: pytest
      - name: Pipeline smoke (regenerate one case into a sandbox)
        # SYMLAB_OUTPUT_DIR is MANDATORY here. Without it, baking a single case rewrites
        # manifests/index.json with that one case, truncating the committed 55-case index to 1.
        # The next step then reports drift and fails, so this job was red on every run for a reason
        # that had nothing to do with the change under test. It is the same rule the tests enforce:
        # a bake must never write the canonical tree, and the smoke bake is a bake.
        run: SYMLAB_OUTPUT_DIR="${RUNNER_TEMP}/symlab-smoke" python -m symlab.pipeline monod-saturation
      - name: CONTRACT 2, the COMMITTED manifests and artifacts are consistent (no drift)
        # Runs against the checked-out tree, which the sandboxed smoke bake above did not touch.
        run: python scripts/check_artifacts.py

  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Base-integrity guards (the regressions this archetype forbids)
        run: |
          fail=0
          # a real .env must never be tracked (only .env.example)
          if git ls-files | grep -qE '(^|/)\.env(\..+)?$' && ! git ls-files | grep -qx '.env.example'; then
            echo "::error::a real .env is tracked (only .env.example may be)"; fail=1; fi
          # venvs / native binaries / heavy model blobs must never be tracked
          if git ls-files | grep -qiE '(^|/)\.?venv|\.(dll|so|dylib|pt|pth)$'; then
            echo "::error::a venv or native/heavy binary is tracked (recreate from requirements; keep models small/LFS)"; fail=1; fi
          # raw/heavy data must never be tracked, commit only compact derived artifacts under data/derived/
          if git ls-files | grep -qiE '\.(parquet|h5|hdf5|nc|mat|npy)$'; then
            echo "::error::raw/heavy data tracked, commit only compact derived artifacts (data/derived/)"; fail=1; fi
          # no leaked local machine paths in tracked sources
          if git grep -nF 'D:\_Repos' -- . ':!.github' >/dev/null 2>&1; then
            echo "::error::leaked local machine path (D:\\_Repos) in a tracked file"; fail=1; fi
          if [ "$fail" -eq 0 ]; then echo "guards: OK"; fi
          exit $fail
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: No template residue (instantiated products must replace the example lab)
        run: python scripts/check_template_residue.py
      - name: No em-dash or emoji in product content (ADR-0067)
        run: python scripts/check_content_standards.py

  frontend:
    # The frontend was built ONLY by the Pages deploy workflow, which runs on main. A TypeScript
    # error therefore passed CI on a pull request and failed after the merge, which is the worst
    # place to find it. It is checked here, on every push and every PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          # Pinned to the SAME major the Pages deploy uses. A CI job that builds on a different
          # runtime from the one that ships can be green while the deploy fails, which is the exact
          # gap this job exists to close.
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Stage the artifacts the app renders
        # copy-data fails the build when a browser-safe engine module is missing, which is the
        # defect that once shipped a live lane whose every module fetch would have 404ed.
        run: cd frontend && node copy-data.mjs
      - name: Type check and build
        run: cd frontend && npm run build
